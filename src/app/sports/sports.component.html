<!DOCTYPE html>
<html lang="en">
<head>
</head>
<body>
    <h2>Sports</h2>
    <div class="row">
        <div *ngFor ="let sports of sportsNews" class="col-lg-4">
            <img src="{{sports.urlToImage}}" alt="" width="100%">
            <h5>{{sports.title}}</h5>
            <button class="btn btn-md btn-primary">
                <a class="link" href="{{sports.url}}" target="_blank">Read More</a>
            </button>
        </div>
    </div>
</body>
</html>
