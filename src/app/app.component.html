<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  <title>News App</title>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid" id="navContainer">
      <h1 class="navbar-brand mt-1" id="brand" href="#">Hello India</h1>
      <button id="icon" class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0" id="categories">
          <li class="text" routerLink = 'topnewshome'  routerLinkActive="active" [routerLinkActiveOptions] = '{exact:true}'>Get Latest News</li>
          <li class="text" routerLinkActive="active" routerLink = 'technology-news'>Technology</li>
          <li class="text" routerLinkActive="active" routerLink = 'buisness-news'>Buisness</li>
          <li routerLinkActive="active" routerLink = 'entertainment'>Entertainment</li>
          <li routerLinkActive="active" routerLink = 'sports'>Sports</li>
          <li routerLinkActive="active" routerLink = 'health'>Health</li>
        </ul>
      </div>
    </div>
  </nav>
  <hr>
  <router-outlet></router-outlet>
</body>
</html>
